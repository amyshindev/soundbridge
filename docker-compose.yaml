services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: soundbridge
      POSTGRES_PASSWORD: soundbridge
      POSTGRES_DB: soundbridge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soundbridge -d soundbridge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # .env의 DATABASE_URL 사용 (Neon 등). 로컬 Postgres 컨테이너 쓸 때만 아래 주석 해제.
      # DATABASE_URL: postgresql+psycopg://soundbridge:soundbridge@db:5432/soundbridge
      # Docker 네트워크 전용 — .env의 localhost 값을 덮어씀
      REDIS_URL: redis://redis:6379
      AUDIO_FILES_ROOT: /data/audio
      # EXAONE_*, COHERE_*, EMBED_MODEL 등은 env_file(.env)에서 로드
    volumes:
      # 루트 .env에 AUDIO_FILES_HOST_PATH 설정 (기본: 로컬 국악음원 원천데이터)
      - ${AUDIO_FILES_HOST_PATH:-C:/Users/hi/Desktop/국악음원_sample/test/원천데이터}:/data/audio:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 브라우저에서 접근하는 API 주소 (빌드 시점에 번들됨)
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
